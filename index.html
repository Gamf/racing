<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#15110e">
  <title>Racing — Gamf Arcade</title>
  <meta name="description" content="Racing cabinets on Gamf Arcade — touch-first, open-source browser games. Insert coin.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="gamf.css">
</head>
<body class="gx">
  <script src="gamf-icons.js"></script>
  <script src="gamf-stats.js"></script>
  <div class="gx-vignette" aria-hidden="true"></div>

  <nav class="gx-nav">
    <div class="gx-nav__bar"></div>
    <div class="gx-nav__inner">
      <a class="gx-logo" href="../">
        <span class="gx-logo__mark">G</span>
        <span class="gx-logo__word">GAMF</span>
      </a>
      <span class="gx-nav__spacer"></span>
      <a class="gx-back" href="../"><svg class="gx-ico"><use href="#i-back"/></svg> All Cabinets</a>
      <a class="gx-hiscores" href="../stats.html"><svg class="gx-ico"><use href="#i-trophy"/></svg> Hi-Scores</a>
    </div>
  </nav>

  <div class="gx-wrap">
    <div class="gx-cabhead">
      <h2 id="title">RACING</h2>
      <span class="gx-cabhead__count" id="count">Loading…</span>
    </div>
    <div class="gx-grid" id="grid">
      <div class="gx-skel"></div><div class="gx-skel"></div><div class="gx-skel"></div><div class="gx-skel"></div><div class="gx-skel"></div><div class="gx-skel"></div>
    </div>
    <div id="empty"></div>

    <footer class="gx-foot-note">Open Source · Touch First · Hosted On GitHub Pages</footer>
  </div>

  <script type="module">
    const GENRE_SLUG = "racing";
    const GENRE_TITLE = "Racing";
    const GENRE_ICON = "i-flag";

    const grid = document.getElementById('grid');
    const countEl = document.getElementById('count');
    const emptyEl = document.getElementById('empty');

    const esc = (s = '') => String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const fmt = (n) => Number(n).toLocaleString('en-US');
    const ico = (id, cls) => `<svg class="gx-ico${cls ? ' ' + cls : ''}"><use href="#${id}"/></svg>`;
    function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}

    if (window.gamfVisit) window.gamfVisit();
    init();

    async function init() {
      const label = GENRE_TITLE.toUpperCase();
      let data;
      try {
        const res = await fetch('games.json', { cache: 'no-cache' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (err) {
        grid.innerHTML = '';
        emptyEl.innerHTML = `<p class="gx-error">Couldn't load games.json — ${esc(err.message)}</p>`;
        countEl.textContent = 'Unavailable';
        return;
      }

      const raw = data.games || [];
      const games = raw.map((g) => decorate(g, label));
      countEl.textContent = `${games.length} ${games.length === 1 ? 'Cabinet' : 'Cabinets'}`;

      if (!games.length) {
        grid.innerHTML = '';
        emptyEl.innerHTML = `<div class="gx-empty"><h3>NO CABINETS YET</h3><p>Insert a different coin</p></div>`;
        return;
      }

      emptyEl.innerHTML = '';
      grid.innerHTML = games.map(cabinet).join('');
      grid.querySelectorAll('.gx-cabinet').forEach((b, i) => b.addEventListener('click', () => launch(games[i])));
    }

    function decorate(game, label) {
      const slug = game.slug || game.title;
      const h = hashStr(slug + GENRE_SLUG);
      const rating = game.rating != null ? game.rating : 3 + (h % 3);
      const score = game.score != null ? game.score : 5000 + (h % 1495000);
      const hot = game.hot != null ? game.hot : (/classic|retro|arcade/i.test((game.tags || []).join(' ')) || h % 5 === 0);
      return {
        slug: game.slug,
        title: game.title,
        genreLabel: label,
        icon: GENRE_ICON,
        dims: game.dims || '2D',
        rating, score, hot,
        url: new URL(game.path, document.baseURI).href,
      };
    }

    function ratingTicks(r) { let s = ''; for (let i = 0; i < 5; i++) s += `<span class="${i < r ? 'on' : ''}"></span>`; return `<div class="gx-rate">${s}</div>`; }

    function cabinet(g) {
      return `<button class="gx-cabinet" aria-label="Play ${esc(g.title)}, ${esc(g.genreLabel)}">
        <div class="gx-cab__plate">${ico(g.icon)}<span class="gx-cab__genre">${esc(g.genreLabel)}</span><span class="gx-cab__dims">${esc(g.dims)}</span></div>
        <div class="gx-cab__cover${g.hot ? ' is-hot' : ''}">
          <span class="gx-cab__big">${ico(g.icon)}</span>
          ${g.hot ? `<span class="gx-cab__hot">${ico('i-bolt')} Hot</span>` : ''}
          <h3 class="gx-cab__title">${esc(g.title.toUpperCase())}</h3>
        </div>
        <div class="gx-cab__ctrl">
          <div style="min-width:0">${ratingTicks(g.rating)}<span class="gx-cab__hi">HI ${fmt(g.score)}</span></div>
          <span class="gx-cab__play">${ico('i-play')} Play</span>
        </div></button>`;
    }

    let navigating = false;
    function launch(g) {
      if (!g || navigating) return;
      navigating = true;
      if (window.gamfPlay) window.gamfPlay(g.slug);
      window.location.href = g.url;
    }
  </script>
</body>
</html>
