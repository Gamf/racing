<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#07080c">
  <title>Racing — Gamf</title>
  <meta name="description" content="Racing games on Gamf — touch-first, open-source browser games.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="gamf.css">
  <style>
    /* compact genre hero band — uses the shared accent */
    .gx-genre-hero { display: flex; align-items: center; gap: var(--sp-4); margin: var(--sp-4) 0 var(--sp-6);
      padding: clamp(18px, 5vw, 32px); border-radius: var(--r-xl); border: 1px solid var(--gx-line);
      background: linear-gradient(120deg, color-mix(in srgb, var(--gx-accent) 28%, var(--gx-bg-2)) 0%, var(--gx-bg-2) 60%);
      box-shadow: var(--sh-2); }
    .gx-genre-hero__icon { flex: none; width: clamp(56px, 14vw, 76px); height: clamp(56px, 14vw, 76px);
      border-radius: var(--r-lg); display: grid; place-items: center; color: #fff;
      background: linear-gradient(135deg, var(--gx-accent), color-mix(in srgb, var(--gx-accent) 30%, #000));
      box-shadow: 0 0 24px color-mix(in srgb, var(--gx-accent) 50%, transparent); }
    .gx-genre-hero__icon svg { width: 52%; height: 52%; }
    .gx-genre-hero__title { font-size: var(--fs-2xl); line-height: 1.02; }
    .gx-genre-hero__count { color: var(--gx-text-2); font-size: var(--fs-md); margin-top: 4px; font-family: var(--gx-font-display); }
  </style>
</head>
<body class="gx" style="--gx-accent:#f2c14e">
  <script src="gamf-icons.js"></script>
  <script src="gamf-stats.js"></script>

  <nav class="gx-nav">
    <div class="gx-nav__inner">
      <a class="gx-logo" href="../">
        <span class="gx-logo__mark"><svg class="gx-ico"><use href="#i-logo"/></svg></span>
        Gamf
      </a>
      <span class="gx-nav__spacer"></span>
      <div class="gx-nav__links">
        <a class="gx-btn gx-btn--ghost gx-btn--sm" href="../"><svg class="gx-ico"><use href="#i-back"/></svg> All games</a>
        <a class="gx-btn gx-btn--ghost gx-btn--sm" href="../stats.html"><svg class="gx-ico"><use href="#i-stats"/></svg> Stats</a>
      </div>
    </div>
  </nav>

  <div class="gx-wrap">
    <header class="gx-genre-hero">
      <span class="gx-genre-hero__icon"><svg class="gx-ico"><use href="#i-car"/></svg></span>
      <div>
        <h1 class="gx-genre-hero__title">Racing</h1>
        <p class="gx-genre-hero__count" id="count">Loading…</p>
      </div>
    </header>

    <main class="gx-wrap" style="padding:0">
      <div class="gx-grid" id="grid">
        <div class="gx-skel"></div><div class="gx-skel"></div><div class="gx-skel"></div><div class="gx-skel"></div>
      </div>
    </main>
  </div>

  <footer class="gx-foot gx-wrap">Open-source · touch-first · hosted on GitHub Pages</footer>

  <script type="module">
    const ACCENT = '#f2c14e';
    const grid = document.getElementById('grid');
    const countEl = document.getElementById('count');

    if (window.gamfVisit) window.gamfVisit();
    init();

    async function init() {
      let data;
      try {
        const res = await fetch('games.json', { cache: 'no-cache' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (err) {
        grid.innerHTML = `<p class="gx-error">Couldn't load games.json — ${esc(err.message)}</p>`;
        countEl.textContent = 'Unavailable';
        return;
      }

      const games = data.games || [];
      countEl.textContent = `${games.length} game${games.length === 1 ? '' : 's'}`;
      grid.innerHTML = '';
      if (!games.length) {
        grid.innerHTML = `<p class="gx-empty">Nothing here yet — check back soon.</p>`;
        return;
      }
      for (const game of games) grid.appendChild(card(game));
    }

    function card(game) {
      const a = document.createElement('a');
      a.className = 'gx-card';
      a.href = new URL(game.path, document.baseURI).href;
      const cover = safeColor(game.color || ACCENT);
      a.innerHTML = `
        <div class="gx-cover" style="--cover:${cover}">
          ${game.dims ? `<span class="gx-cover__dims">${esc(game.dims)}</span>` : ''}
          <span class="gx-cover__glyph">${esc(game.icon || '🎮')}</span>
          <span class="gx-cover__play"><svg class="gx-ico"><use href="#i-play"/></svg></span>
        </div>
        <div class="gx-card__body">
          <span class="gx-card__title">${esc(game.title)}</span>
          <span class="gx-card__meta">${(game.tags || []).slice(0, 3).map(esc).join(' · ')}</span>
          ${game.author ? `<span class="gx-card__by">by ${esc(game.author)}</span>` : ''}
        </div>`;
      a.addEventListener('click', () => { if (window.gamfPlay) window.gamfPlay(game.slug); });
      return a;
    }

    function esc(s = '') { return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
    function safeColor(c) { return /^#[0-9a-fA-F]{3,8}$/.test(c) ? c : ACCENT; }
  </script>
</body>
</html>
