<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#07080c">
  <title>Rally Stage — Gamf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../gamf.css">
  <style>
    body{ --gx-accent:#f2c14e; margin:0; height:100%; overflow:hidden;
      touch-action:none; -webkit-user-select:none; user-select:none; }
    html,body{ height:100%; }
    canvas{ display:block; width:100%; height:100%; touch-action:none; }

    /* center "+time" / status flash */
    #flash{ position:fixed; left:0; right:0; top:34%; z-index:5; text-align:center;
      font-family:var(--gx-font-display); font-weight:700; font-size:clamp(2rem,9vw,3.4rem);
      color:var(--gx-good); text-shadow:0 4px 24px rgba(0,0,0,.6); pointer-events:none;
      opacity:0; transform:translateY(8px); transition:opacity .18s, transform .18s; }
    #flash.show{ opacity:1; transform:translateY(0); }
    /* timer-bar under HUD */
    #timewrap{ position:fixed; left:max(var(--sp-4),env(safe-area-inset-left));
      right:max(var(--sp-4),env(safe-area-inset-right));
      top:calc(env(safe-area-inset-top) + 56px); z-index:4; pointer-events:none; }
    #timebar{ height:8px; border-radius:var(--r-pill); overflow:hidden;
      background:color-mix(in srgb, var(--gx-bg) 55%, transparent); border:1px solid var(--gx-line);
      backdrop-filter:blur(8px); }
    #timefill{ height:100%; width:100%; border-radius:var(--r-pill);
      background:linear-gradient(90deg, var(--gx-good), var(--gx-accent));
      transition:width .12s linear; transform-origin:left; }
    #timefill.low{ background:linear-gradient(90deg, var(--gx-danger), var(--gx-warn)); }
    /* on-screen steer + drift pads (touch) */
    #pads{ position:fixed; inset:0; z-index:3; pointer-events:none; display:none; }
    body.touch #pads{ display:block; }
    .pad{ position:absolute; bottom:calc(env(safe-area-inset-bottom) + 70px);
      width:84px; height:84px; border-radius:50%; pointer-events:auto;
      display:grid; place-items:center; color:var(--gx-text);
      background:color-mix(in srgb, var(--gx-bg) 50%, transparent);
      border:1px solid var(--gx-line-2); backdrop-filter:blur(8px); }
    .pad:active{ background:color-mix(in srgb, var(--gx-accent) 40%, transparent); }
    .pad svg{ width:32px; height:32px; }
    #pL{ left:calc(env(safe-area-inset-left) + 16px); }
    #pR{ left:calc(env(safe-area-inset-left) + 112px); }
    #pD{ right:calc(env(safe-area-inset-right) + 16px); width:96px; height:96px;
      font-family:var(--gx-font-display); font-weight:700; font-size:var(--fs-sm); }
  </style>
</head>
<body class="gx">
  <script src="../../gamf-icons.js"></script>
  <div class="gx-hud">
    <a class="gx-hud__back" href="../../"><svg class="gx-ico"><use href="#i-back"/></svg> Racing</a>
    <span class="gx-hud__spacer"></span>
    <span class="gx-pill"><svg class="gx-ico" style="width:1em;height:1em"><use href="#i-target"/></svg> Gate <b id="gate">0</b></span>
    <span class="gx-pill"><svg class="gx-ico" style="width:1em;height:1em"><use href="#i-car"/></svg> <b id="score">0</b></span>
    <span class="gx-pill gx-pill--best"><svg class="gx-ico" style="width:1em;height:1em"><use href="#i-trophy"/></svg> Best <b id="best">0</b></span>
  </div>

  <div id="timewrap"><div id="timebar"><div id="timefill"></div></div></div>
  <div id="flash"></div>

  <div class="gx-hint">
    <span class="gx-hint__chip"><svg class="gx-ico"><use href="#i-touch"/></svg> steer + drift pads</span>
    <span class="gx-hint__chip"><svg class="gx-ico"><use href="#i-left"/></svg><svg class="gx-ico"><use href="#i-right"/></svg> A D / arrows steer</span>
    <span class="gx-hint__chip"><svg class="gx-ico"><use href="#i-down"/></svg> Space drift</span>
    <span class="gx-hint__chip"><svg class="gx-ico"><use href="#i-pause"/></svg> P pause</span>
    <span class="gx-hint__chip"><svg class="gx-ico"><use href="#i-restart"/></svg> R restart</span>
  </div>

  <div id="pads">
    <button class="pad" id="pL" aria-label="steer left"><svg class="gx-ico"><use href="#i-left"/></svg></button>
    <button class="pad" id="pR" aria-label="steer right"><svg class="gx-ico"><use href="#i-right"/></svg></button>
    <button class="pad" id="pD" aria-label="drift">DRIFT</button>
  </div>

  <div class="gx-modal" id="over">
    <div class="gx-modal__card">
      <h2 class="gx-modal__title" id="overTitle">Stage Over</h2>
      <div class="gx-modal__row">Gates cleared <b id="finalGate">0</b></div>
      <div class="gx-modal__row">Score <b id="finalScore">0</b></div>
      <div class="gx-modal__row">Best <b id="finalBest">0</b></div>
      <p class="gx-modal__new" id="newBest"></p>
      <button class="gx-btn gx-btn--primary" id="again"><svg class="gx-ico"><use href="#i-restart"/></svg> Race again</button>
    </div>
  </div>

  <div class="gx-modal" id="pauseM">
    <div class="gx-modal__card">
      <h2 class="gx-modal__title">Paused</h2>
      <div class="gx-modal__row">Gate <b id="pGate">0</b></div>
      <div class="gx-modal__row">Score <b id="pScore">0</b></div>
      <button class="gx-btn gx-btn--primary" id="resume"><svg class="gx-ico"><use href="#i-play"/></svg> Resume</button>
    </div>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { onDrag } from './touch.js';

    const SLUG='rally', BEST_KEY='gamf-racing-'+SLUG+'-best';

    /* ---------- seeded RNG (LCG, no Math.random / Date) ---------- */
    let seed=1337;
    function srnd(){ seed=(seed*1664525+1013904223)>>>0; return seed/4294967296; }
    function rng(a,b){ return a+(b-a)*srnd(); }

    /* ---------- renderer / scene ---------- */
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
    renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const scene=new THREE.Scene();
    scene.background=new THREE.Color(0x0a0c12);
    scene.fog=new THREE.Fog(0x0a0c12, 30, 95);

    // chase camera (above & behind the car)
    const camera=new THREE.PerspectiveCamera(60,1,0.1,300);

    scene.add(new THREE.HemisphereLight(0x9fb4ff,0x10131f,0.9));
    const dl=new THREE.DirectionalLight(0xffffff,1.0); dl.position.set(8,16,6);
    dl.castShadow=true; dl.shadow.mapSize.set(2048,2048);
    dl.shadow.camera.near=1; dl.shadow.camera.far=120;
    dl.shadow.camera.left=-40; dl.shadow.camera.right=40; dl.shadow.camera.top=40; dl.shadow.camera.bottom=-40;
    scene.add(dl);
    const accent=new THREE.PointLight(0xffcf6b,0.7,30); scene.add(accent);

    // big ground
    const ground=new THREE.Mesh(
      new THREE.PlaneGeometry(1000,1000),
      new THREE.MeshStandardMaterial({color:0x161d18, metalness:0.0, roughness:1}));
    ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

    /* ---------- car ---------- */
    const carGroup=new THREE.Group();
    const body=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.6,2.7),
      new THREE.MeshStandardMaterial({color:0xf2c14e,metalness:0.5,roughness:0.3}));
    body.castShadow=true; carGroup.add(body);
    const cabin=new THREE.Mesh(new THREE.BoxGeometry(1.1,0.55,1.2),
      new THREE.MeshStandardMaterial({color:0x10131f,metalness:0.6,roughness:0.2}));
    cabin.position.set(0,0.5,-0.05); cabin.castShadow=true; carGroup.add(cabin);
    const headl=new THREE.Mesh(new THREE.BoxGeometry(1.2,0.18,0.18),
      new THREE.MeshStandardMaterial({color:0xfff3c0,emissive:0xffe08a,emissiveIntensity:1.6}));
    headl.position.set(0,0.05,-1.4); carGroup.add(headl);
    const tail=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.18,0.16),
      new THREE.MeshStandardMaterial({color:0xe0556b,emissive:0xe0556b,emissiveIntensity:2}));
    tail.position.set(0,0.1,1.42); carGroup.add(tail);
    const wheelMat=new THREE.MeshStandardMaterial({color:0x0c0e15,roughness:0.8});
    const wheels=[];
    [[-0.78,0.95],[0.78,0.95],[-0.78,-0.95],[0.78,-0.95]].forEach(([x,z])=>{
      const w=new THREE.Mesh(new THREE.CylinderGeometry(0.36,0.36,0.3,12),wheelMat);
      w.rotation.z=Math.PI/2; w.position.set(x,-0.18,z); w.castShadow=true; carGroup.add(w); wheels.push(w);
    });
    carGroup.position.y=0.55; scene.add(carGroup);

    /* ---------- skid trail (ring buffer of quads) ---------- */
    const SKID=120;
    const skidMat=new THREE.MeshBasicMaterial({color:0x0a0c10,transparent:true,opacity:0.45});
    const skids=[]; for(let i=0;i<SKID;i++){
      const m=new THREE.Mesh(new THREE.PlaneGeometry(1.4,0.55),skidMat.clone());
      m.rotation.x=-Math.PI/2; m.position.y=0.012; m.visible=false; scene.add(m); skids.push(m);
    }
    let skidI=0;
    function dropSkid(x,z,ang){
      const m=skids[skidI]; skidI=(skidI+1)%SKID;
      m.position.set(x,0.012,z); m.rotation.z=-ang; m.material.opacity=0.5; m.visible=true;
    }

    /* ---------- dust burst (also crash sparks) ---------- */
    const dust=[]; const dustGeo=new THREE.SphereGeometry(0.16,6,6);
    for(let i=0;i<34;i++){ const m=new THREE.Mesh(dustGeo,
      new THREE.MeshStandardMaterial({color:0xd8c9a0,emissive:0x6b5a36,emissiveIntensity:0.4}));
      m.visible=false; scene.add(m); dust.push({m,vx:0,vy:0,vz:0,life:0}); }
    function burst(x,y,z,col,spread){ let n=0; for(const p of dust){ if(n++>=18)break;
      p.m.position.set(x,y,z); p.m.material.color.set(col); p.m.material.emissive.set(col);
      p.m.visible=true; p.vx=rng(-1,1)*spread; p.vy=rng(0.1,0.5); p.vz=rng(-1,1)*spread; p.life=1; } }

    /* ---------- obstacles (trees + rocks) — pooled, recycled ahead ---------- */
    const OBN=60; const obstacles=[];
    const treeTrunk=new THREE.MeshStandardMaterial({color:0x4a3524,roughness:0.9});
    const treeLeaf=new THREE.MeshStandardMaterial({color:0x244a2e,roughness:0.85,emissive:0x0a1a10,emissiveIntensity:0.3});
    const rockMat=new THREE.MeshStandardMaterial({color:0x3a4150,roughness:0.95,metalness:0.1});
    for(let i=0;i<OBN;i++){
      const g=new THREE.Group();
      const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.3,1.4,7),treeTrunk);
      trunk.position.y=0.7; trunk.castShadow=true;
      const leaf=new THREE.Mesh(new THREE.ConeGeometry(1.0,2.2,8),treeLeaf);
      leaf.position.y=2.1; leaf.castShadow=true;
      g.add(trunk); g.add(leaf);
      const rock=new THREE.Mesh(new THREE.DodecahedronGeometry(0.85,0),rockMat);
      rock.position.y=0.45; rock.castShadow=true; rock.visible=false; g.add(rock);
      g.userData={trunk,leaf,rock,r:1.0};
      g.visible=false; scene.add(g);
      obstacles.push(g);
    }

    /* ---------- checkpoint gates (two posts + a flag plane between) ---------- */
    const postMat=new THREE.MeshStandardMaterial({color:0xf2c14e,emissive:0x6b4e10,emissiveIntensity:0.7,metalness:0.3,roughness:0.4});
    const gateGlowMat=new THREE.MeshBasicMaterial({color:0xffcf6b,transparent:true,opacity:0.22,side:THREE.DoubleSide});
    function mkGate(){
      const g=new THREE.Group();
      const pl=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.22,4.2,10),postMat); pl.position.set(-3.4,2.1,0); pl.castShadow=true;
      const pr=pl.clone(); pr.position.x=3.4;
      const glow=new THREE.Mesh(new THREE.PlaneGeometry(6.8,4.2),gateGlowMat); glow.position.y=2.1;
      const beam=new THREE.Mesh(new THREE.BoxGeometry(7.0,0.3,0.3),postMat); beam.position.y=4.1;
      g.add(pl); g.add(pr); g.add(glow); g.add(beam);
      g.userData={glow}; scene.add(g);
      return g;
    }
    const GATE_HALF=3.0;          // car must pass within +/- this of gate centre x (course-space)
    const gateA=mkGate(), gateB=mkGate();   // current + next gate, recycled

    /* ---------- course state ----------
       The course is a chain of gates. We keep it simple & fair: the car always
       drives in +Z (away from camera is -Z in three, so we move WORLD toward +Z
       past a fixed-ish car). To keep maths clean we instead MOVE THE CAR through
       world space along Z- and translate the whole scene back periodically.
       We use a "course distance" d that increases. Gates/obstacles are placed at
       absolute course Z and shifted into view. */
    let courseZ;           // car's travelled distance (world -Z)
    let curGateZ, nextGateZ, curGateX, nextGateX;
    let gateIdx;           // gates cleared

    function placeGates(){
      // current gate ahead of car, next further ahead
      curGateX = clampGateX(rng(-9,9));
      nextGateX = clampGateX(curGateX + rng(-9,9));
      curGateZ = courseZ - 34;
      nextGateZ = curGateZ - 30;
      layoutGates();
    }
    function clampGateX(x){ return Math.max(-13,Math.min(13,x)); }
    function layoutGates(){
      gateA.position.set(curGateX,0, curGateZ);
      gateB.position.set(nextGateX,0, nextGateZ);
    }
    function advanceGate(){
      gateIdx++;
      // shift: B becomes A, generate new B
      curGateX = nextGateX; curGateZ = nextGateZ;
      nextGateX = clampGateX(curGateX + rng(-11,11));
      nextGateZ = curGateZ - rng(28,36);
      layoutGates();
      scatterObstacles();
    }

    // scatter obstacles in the corridor between current & next gate, avoiding the racing line
    function scatterObstacles(){
      const z0=curGateZ, z1=nextGateZ;
      for(const g of obstacles){
        if(g.visible && g.position.z > carGroup.position.z + 12) g.visible=false; // recycle ones behind
      }
      let placed=0;
      for(const g of obstacles){
        if(g.visible) continue;
        if(placed>=10) break;
        const t=srnd();
        const z=z0 + (z1-z0)*rng(0.12,0.92);
        const lineX=curGateX + (nextGateX-curGateX)*((z-z0)/(z1-z0));
        // place to a side of the racing line so there's always a gap
        let x = lineX + (srnd()<0.5?-1:1)*rng(3.2,12);
        x=Math.max(-15,Math.min(15,x));
        g.position.set(x,0,z);
        g.rotation.y=rng(0,6.28);
        const isRock=srnd()<0.32;
        g.userData.trunk.visible=!isRock; g.userData.leaf.visible=!isRock;
        g.userData.rock.visible=isRock;
        g.userData.r=isRock?0.85:0.95;
        g.scale.setScalar(rng(0.85,1.3));
        g.visible=true; placed++;
      }
    }

    /* ---------- game state ---------- */
    let vx, vz;            // car velocity in world (vz negative = forward)
    let heading;          // car facing angle (radians, 0 = -Z forward)
    let timeLeft;         // seconds banked
    let score, alive, paused, started;
    let drifting=false, steer=0;   // steer -1..1
    let best=+(localStorage.getItem(BEST_KEY)||0);
    const $=id=>document.getElementById(id);
    $('best').textContent=best;

    const MAXTIME=22;     // visual full bar
    function reset(){
      seed=1337;
      courseZ=0; gateIdx=0; score=0; timeLeft=12;
      vx=0; vz=-0.18; heading=0;
      carGroup.position.set(0,0.55,0); carGroup.rotation.set(0,0,0);
      drifting=false; steer=0;
      alive=true; paused=false; started=false;
      obstacles.forEach(g=>g.visible=false);
      dust.forEach(p=>{p.m.visible=false;p.life=0;});
      skids.forEach(m=>{m.visible=false;});
      placeGates(); scatterObstacles();
      $('gate').textContent=0; $('score').textContent=0;
      $('over').classList.remove('gx-show'); $('pauseM').classList.remove('gx-show');
      flashHide();
      updTimeBar();
    }

    let flashT=0;
    function flash(txt,col){ const f=$('flash'); f.textContent=txt; f.style.color=col||'var(--gx-good)';
      f.classList.add('show'); flashT=0.9; }
    function flashHide(){ $('flash').classList.remove('show'); flashT=0; }

    function updTimeBar(){
      const pct=Math.max(0,Math.min(1,timeLeft/MAXTIME));
      const fill=$('timefill'); fill.style.width=(pct*100).toFixed(1)+'%';
      fill.classList.toggle('low', timeLeft<4);
    }

    /* ---------- input ---------- */
    const keys={left:false,right:false,gas:true,drift:false};
    const GAMEKEYS=new Set(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','a','A','d','D','w','W','s','S',' ','Enter','r','R','p','P']);
    addEventListener('keydown',(e)=>{
      if(GAMEKEYS.has(e.key)) e.preventDefault();
      if(e.repeat) return;
      if(e.key==='r'||e.key==='R'){ reset(); return; }
      if(e.key==='p'||e.key==='P'){ togglePause(); return; }
      if(!alive){ if(e.key===' '||e.key==='Enter'){ reset(); } return; }
      if(paused){ if(e.key===' '||e.key==='Enter') togglePause(); return; }
      started=true;
      if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=true;
      else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=true;
      if(e.key===' '||e.key==='ArrowDown'||e.key==='s'||e.key==='S') keys.drift=true;
    });
    addEventListener('keyup',(e)=>{
      if(GAMEKEYS.has(e.key)) e.preventDefault();
      if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=false;
      else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=false;
      if(e.key===' '||e.key==='ArrowDown'||e.key==='s'||e.key==='S') keys.drift=false;
    });

    // touch: drag to steer (proportional) + on-screen pads
    let dragSteer=0;
    onDrag(renderer.domElement,{
      start:()=>{ if(alive&&!paused){ started=true; } },
      move:({dx})=>{ if(alive&&!paused){ dragSteer=Math.max(-1,Math.min(1,dragSteer+dx*0.012)); started=true; } },
      end:()=>{ dragSteer=0; }
    });
    function bindHold(el,on,off){
      el.addEventListener('pointerdown',e=>{e.preventDefault(); started=true; on();});
      el.addEventListener('pointerup',e=>{e.preventDefault(); off();});
      el.addEventListener('pointercancel',e=>{off();});
      el.addEventListener('pointerleave',e=>{off();});
    }
    bindHold($('pL'),()=>keys.left=true,()=>keys.left=false);
    bindHold($('pR'),()=>keys.right=true,()=>keys.right=false);
    bindHold($('pD'),()=>keys.drift=true,()=>keys.drift=false);
    // show touch pads only once a touch is detected
    addEventListener('touchstart',()=>document.body.classList.add('touch'),{once:true,passive:true});

    function togglePause(){
      if(!alive) return;
      paused=!paused;
      if(paused){ $('pGate').textContent=gateIdx; $('pScore').textContent=score; $('pauseM').classList.add('gx-show'); }
      else $('pauseM').classList.remove('gx-show');
    }
    $('resume').onclick=togglePause;
    $('again').onclick=reset;

    function resize(){ renderer.setSize(innerWidth,innerHeight);
      camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); }
    addEventListener('resize',resize); resize();

    function end(reason){
      if(!alive) return;
      alive=false;
      burst(carGroup.position.x,0.6,carGroup.position.z,0xff8a3b,2.2);
      let isNew=false;
      if(score>best){ best=score; isNew=true; localStorage.setItem(BEST_KEY,String(best)); $('best').textContent=best; }
      $('overTitle').textContent = reason==='crash' ? 'Crashed!' : "Time's up!";
      $('finalGate').textContent=gateIdx;
      $('finalScore').textContent=score;
      $('finalBest').textContent=best;
      $('newBest').textContent = isNew ? 'New best!' : '';
      $('over').classList.add('gx-show');
    }

    /* ---------- physics + loop ---------- */
    const FWD=new THREE.Vector3();
    const ACC=0.0072, MAXSPD=0.62, FRICT=0.992, TURN=0.045;
    let t=0;
    function step(){
      // resolve steer from keys / drag
      let s=0;
      if(keys.left) s-=1; if(keys.right) s+=1;
      s+=dragSteer;
      steer += (Math.max(-1,Math.min(1,s)) - steer)*0.25;
      drifting = keys.drift;

      // forward speed (always accelerating; gentle cap)
      const spd=Math.hypot(vx,vz);
      // heading turns based on steer; sharper while drifting, scaled by speed
      const grip = drifting ? 1.7 : 1.0;
      heading += steer*TURN*grip*Math.min(1, spd/0.25);

      // desired forward direction from heading (forward = -Z at heading 0)
      const fx=Math.sin(heading), fz=-Math.cos(heading);
      // accelerate along facing
      vx += fx*ACC; vz += fz*ACC;

      // lateral grip: when not drifting, kill sideways velocity (snappy); drifting = slide
      const rightx=Math.cos(heading), rightz=Math.sin(heading);
      const lat = vx*rightx + vz*rightz;            // sideways component
      const latKill = drifting ? 0.86 : 0.30;       // keep more lateral when drifting
      vx -= rightx*lat*(1-latKill);
      vz -= rightz*lat*(1-latKill);

      // friction + cap
      vx*=FRICT; vz*=FRICT;
      const cap = drifting ? MAXSPD*0.86 : MAXSPD;
      const sp2=Math.hypot(vx,vz);
      if(sp2>cap){ vx*=cap/sp2; vz*=cap/sp2; }

      // integrate
      carGroup.position.x+=vx; carGroup.position.z+=vz;
      carGroup.rotation.y=-heading;             // three Y rotation opposite sign
      // body roll & drift yaw lean
      const driftLean = drifting ? steer*0.18 : steer*0.06;
      carGroup.rotation.z = -driftLean;
      body.rotation.y = drifting ? steer*0.22 : 0;
      // wheels spin
      for(const w of wheels) w.rotation.x += sp2*1.6;

      courseZ = carGroup.position.z;

      // keep car roughly inside the stage corridor (soft walls)
      const lim=16;
      if(carGroup.position.x> lim){ carGroup.position.x=lim; vx=Math.min(vx,0); }
      if(carGroup.position.x<-lim){ carGroup.position.x=-lim; vx=Math.max(vx,0); }

      // drift skid marks + dust
      if(drifting && sp2>0.18 && (Math.abs(lat)>0.04)){
        dropSkid(carGroup.position.x-rightx*0.5, carGroup.position.z-rightz*0.5, heading);
        dropSkid(carGroup.position.x+rightx*0.5, carGroup.position.z+rightz*0.5, heading);
        if((t*60|0)%4===0) burst(carGroup.position.x, 0.25, carGroup.position.z+0.9, 0xd8c9a0, 0.5);
      }

      // ---- timer ----
      timeLeft -= 1/60;
      if(timeLeft<=0){ timeLeft=0; updTimeBar(); end('time'); return; }

      // ---- gate pass detection ----
      // car passes the current gate's Z plane (car z goes below gate z while in window)
      if(carGroup.position.z <= curGateZ){
        const dx=Math.abs(carGroup.position.x-curGateX);
        if(dx < GATE_HALF){
          // success: bank time, score, advance
          const bonus = 3.2 + Math.max(0, 1.4 - dx*0.4);   // tighter = a touch more
          timeLeft = Math.min(MAXTIME, timeLeft + bonus);
          score += 10 + gateIdx*2;
          if(drifting) score += 3;
          flash('+'+bonus.toFixed(1)+'s', 'var(--gx-good)');
          // light up next gate glow ping
          burst(curGateX,2.0,curGateZ,0x36e0c2,1.4);
          advanceGate();
          $('gate').textContent=gateIdx; $('score').textContent=score;
        } else {
          // missed the gate window -> stage over
          flash('MISSED!', 'var(--gx-danger)');
          end('time');
          return;
        }
      }

      // ---- obstacle collision ----
      for(const g of obstacles){
        if(!g.visible) continue;
        const ddx=g.position.x-carGroup.position.x, ddz=g.position.z-carGroup.position.z;
        const rr=g.userData.r*g.scale.x + 0.9;
        if(ddx*ddx+ddz*ddz < rr*rr){ end('crash'); return; }
      }

      updTimeBar();
    }

    function updateCamera(){
      // chase cam behind car along its heading
      const fx=Math.sin(heading), fz=-Math.cos(heading);
      const camDist=10.5, camH=6.0;
      camera.position.x += (carGroup.position.x - fx*camDist - camera.position.x)*0.12;
      camera.position.z += (carGroup.position.z - fz*camDist - camera.position.z)*0.12;
      camera.position.y += (camH - camera.position.y)*0.12;
      camera.lookAt(carGroup.position.x + fx*6, 0.6, carGroup.position.z + fz*6);
      accent.position.set(carGroup.position.x, 4, carGroup.position.z);
      dl.position.set(carGroup.position.x+8, 16, carGroup.position.z+6);
      dl.target.position.copy(carGroup.position); dl.target.updateMatrixWorld();
    }

    function animate(){
      requestAnimationFrame(animate);
      t+=1/60;
      if(alive && !paused && started){ step(); }
      else if(alive && !paused && !started){
        // idle pre-start: gentle idle bob, timer waits
        carGroup.position.y=0.55+Math.sin(t*4)*0.01;
      }
      // pulse current gate glow
      const pulse=0.18+Math.sin(t*5)*0.08;
      gateA.userData.glow.material.opacity=pulse+0.06;
      gateB.userData.glow.material.opacity=0.12;

      // animate dust / sparks always
      for(const p of dust){ if(p.life>0){ p.life-=0.028; p.vy-=0.018;
        p.m.position.x+=p.vx; p.m.position.y+=p.vy; p.m.position.z+=p.vz;
        if(p.m.position.y<0.05){ p.m.position.y=0.05; p.vy*=-0.3; }
        p.m.scale.setScalar(Math.max(0.01,p.life)); if(p.life<=0) p.m.visible=false; } }
      // fade skids
      for(const m of skids){ if(m.visible){ m.material.opacity*=0.992; if(m.material.opacity<0.04) m.visible=false; } }

      // flash timer
      if(flashT>0){ flashT-=1/60; if(flashT<=0) flashHide(); }

      updateCamera();
      renderer.render(scene,camera);
    }
    reset(); updateCamera();
    camera.position.set(0,6,10.5);   // sensible initial
    animate();
  </script>
</body>
</html>
