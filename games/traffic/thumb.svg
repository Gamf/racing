<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <rect width="320" height="200" fill="#efe6d2"/>
  <!-- green roadside -->
  <rect width="320" height="200" fill="#6f6a3b"/>
  <!-- grey road, slight perspective trapezoid -->
  <polygon points="96,200 224,200 196,0 124,0" fill="#3f4248"/>
  <!-- white road edge lines -->
  <polygon points="96,200 104,200 130,0 124,0" fill="#f3ece0"/>
  <polygon points="216,200 224,200 196,0 190,0" fill="#f3ece0"/>
  <!-- dashed centre lane markings -->
  <polygon points="156,176 164,176 163,150 157,150" fill="#f3ece0"/>
  <polygon points="157,128 163,128 162,104 158,104" fill="#f3ece0"/>
  <polygon points="158,84 162,84 161,62 159,62" fill="#f3ece0"/>
  <polygon points="159,46 161,46 160,28 160,28" fill="#f3ece0"/>
  <!-- rival car (ochre) further up the road -->
  <g>
    <rect x="171" y="58" width="26" height="40" rx="5" fill="#c8923a"/>
    <rect x="176" y="66" width="16" height="13" rx="2" fill="#221f17"/>
    <rect x="173" y="91" width="22" height="5" rx="2" fill="#9b3a22"/>
  </g>
  <!-- player car (oxblood red), closer / bigger -->
  <g>
    <rect x="119" y="118" width="34" height="56" rx="7" fill="#9b3a22"/>
    <rect x="125" y="130" width="22" height="18" rx="3" fill="#221f17"/>
    <rect x="121" y="166" width="30" height="6" rx="2" fill="#221f17"/>
    <rect x="123" y="120" width="26" height="5" rx="2" fill="#efe6d2"/>
  </g>
</svg>
