<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- sky -->
  <rect width="320" height="200" fill="#efe6d2"/>
  <!-- distant slope shoulder -->
  <path d="M0 78 L320 50 L320 200 L0 200 Z" fill="#f3ece0"/>
  <!-- the piste: a bright snow run carving down the hill -->
  <path d="M120 40 L210 40 L300 200 L40 200 Z" fill="#e7eef2"/>
  <!-- fall-line shadow seam -->
  <path d="M168 40 L170 40 L172 200 L166 200 Z" fill="#d7e0e6"/>
  <!-- gate 1: red flags (left + right poles) -->
  <rect x="118" y="74" width="5" height="30" fill="#9b3a22"/>
  <path d="M123 74 L138 78 L123 86 Z" fill="#9b3a22"/>
  <rect x="196" y="74" width="5" height="30" fill="#9b3a22"/>
  <path d="M196 74 L181 78 L196 86 Z" fill="#9b3a22"/>
  <!-- gate 2: blue flags (further down, wider) -->
  <rect x="96" y="120" width="6" height="40" fill="#2f5fa6"/>
  <path d="M102 120 L120 125 L102 134 Z" fill="#2f5fa6"/>
  <rect x="220" y="120" width="6" height="40" fill="#2f5fa6"/>
  <path d="M220 120 L202 125 L220 134 Z" fill="#2f5fa6"/>
  <!-- pine on the margin -->
  <rect x="33" y="96" width="5" height="14" fill="#4a3b2a"/>
  <path d="M35 70 L48 100 L23 100 Z" fill="#6f6a3b"/>
  <path d="M35 82 L46 104 L25 104 Z" fill="#6f6a3b"/>
  <!-- skier carving the fall line -->
  <g transform="translate(160 108)">
    <!-- skis -->
    <path d="M-16 14 L8 6" stroke="#9b3a22" stroke-width="4" stroke-linecap="round"/>
    <path d="M-10 20 L14 12" stroke="#9b3a22" stroke-width="4" stroke-linecap="round"/>
    <!-- body leaning into the carve -->
    <path d="M-2 -2 L-8 12" stroke="#221f17" stroke-width="6" stroke-linecap="round"/>
    <rect x="-9" y="-14" width="14" height="14" rx="3" transform="rotate(-18 -2 -7)" fill="#a4623a"/>
    <circle cx="3" cy="-18" r="5" fill="#221f17"/>
    <rect x="-1" y="-20" width="9" height="3.4" rx="1.5" transform="rotate(-18 3 -18)" fill="#c8923a"/>
  </g>
</svg>
