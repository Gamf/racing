<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f13">
  <title>Lane Dash — Gamf</title>
  <style>
    *{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#0e0f13;color:#f2f3f5;
      font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:none;
      -webkit-user-select:none;user-select:none}
    .hud{position:fixed;top:env(safe-area-inset-top);left:0;right:0;display:flex;gap:16px;
      padding:12px 16px;align-items:center;pointer-events:none;z-index:2;font-weight:700}
    .hud a{color:#6c8cff;text-decoration:none;font-size:.9rem;pointer-events:auto;font-weight:400}
    .hud .best{color:#7fe7c4}
    .hud .score{margin-left:auto;color:#f2c14e}
    .hint{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 14px);left:0;right:0;text-align:center;
      color:#7d8493;font-size:.85rem;z-index:2;pointer-events:none}
    .over{position:fixed;inset:0;display:none;place-items:center;background:rgba(8,9,13,.78);z-index:3;text-align:center}
    .over.show{display:grid} .over h2{margin:0 0 6px;font-size:1.7rem;color:#e0556b}
    .over .row{color:#cdd2dd;margin:2px 0} .over b{color:#f2c14e}
    .over button{all:unset;margin-top:16px;color:#0e0f13;background:linear-gradient(135deg,#7fe7c4,#46c39a);
      font-weight:700;padding:12px 22px;border-radius:12px;cursor:pointer}
    canvas{display:block;width:100%;height:100%;touch-action:none}
  </style>
</head>
<body>
  <div class="hud"><a href="../../">← Racing</a><span class="best">Best: <span id="best">0</span></span>
    <span class="score">Score: <b id="score">0</b></span></div>
  <div class="hint">swipe / drag · A D / ← → steer · P pause · R restart</div>
  <div class="over" id="over"><div><h2>Crashed!</h2>
    <div class="row">Score <b id="finalScore">0</b></div>
    <div class="row">Best <b id="finalBest">0</b></div>
    <button id="again">Dash again ⟳</button></div></div>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { onDrag } from './touch.js';

    const SLUG='sample-racer', BEST_KEY='gamf-racing-'+SLUG+'-best';

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
    renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0e16);
    scene.fog = new THREE.Fog(0x0a0e16, 18, 62);

    const camera = new THREE.PerspectiveCamera(65, 1, 0.1, 140);
    camera.position.set(0, 4.8, 8.5);
    camera.lookAt(0, 0.3, -10);

    scene.add(new THREE.HemisphereLight(0x9fb4ff, 0x161a26, 0.9));
    const dir = new THREE.DirectionalLight(0xffffff, 1.0); dir.position.set(4,10,5);
    dir.castShadow=true; dir.shadow.mapSize.set(1024,1024);
    dir.shadow.camera.left=-12; dir.shadow.camera.right=12; dir.shadow.camera.top=12; dir.shadow.camera.bottom=-12;
    dir.shadow.camera.far=42; scene.add(dir);
    const accent=new THREE.PointLight(0x7fe7c4,0.7,24); accent.position.set(0,4,5); scene.add(accent);

    const ROAD_W = 8;
    const roadMat = new THREE.MeshStandardMaterial({ color:0x1b212f, metalness:0.2, roughness:0.85 });
    const roads = [0,1].map(i=>{ const m=new THREE.Mesh(new THREE.PlaneGeometry(ROAD_W,60), roadMat);
      m.rotation.x=-Math.PI/2; m.position.z = -i*60; m.receiveShadow=true; scene.add(m); return m; });
    // glowing edges
    const edgeMat=new THREE.MeshStandardMaterial({color:0x7fe7c4,emissive:0x1f6a55,emissiveIntensity:1.3});
    [-1,1].forEach(s=>{ const e=new THREE.Mesh(new THREE.BoxGeometry(0.16,0.12,120),edgeMat);
      e.position.set(s*(ROAD_W/2-0.1),0.05,-30); scene.add(e); });
    // center dashes
    const dashMat=new THREE.MeshStandardMaterial({color:0x46506a,emissive:0x1a2236,emissiveIntensity:0.5});
    const dashes=[]; for(let i=0;i<18;i++){ const d=new THREE.Mesh(new THREE.PlaneGeometry(0.22,2.6),dashMat);
      d.rotation.x=-Math.PI/2; d.position.set(0,0.02,-i*6); scene.add(d); dashes.push(d); }

    // Player car
    const carGroup=new THREE.Group();
    const car = new THREE.Mesh(new THREE.BoxGeometry(1.4,0.7,2.4),
      new THREE.MeshStandardMaterial({ color:0xf2c14e, metalness:0.5, roughness:0.3 }));
    car.castShadow=true; carGroup.add(car);
    const cabin=new THREE.Mesh(new THREE.BoxGeometry(1.0,0.5,1.1),
      new THREE.MeshStandardMaterial({color:0x10131f,metalness:0.6,roughness:0.2}));
    cabin.position.set(0,0.55,0.1); cabin.castShadow=true; carGroup.add(cabin);
    const tail=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.18,0.18),
      new THREE.MeshStandardMaterial({color:0x7fe7c4,emissive:0x7fe7c4,emissiveIntensity:2}));
    tail.position.set(0,0.1,1.25); carGroup.add(tail);
    carGroup.position.set(0,0.4,4); scene.add(carGroup);

    // Obstacles
    const obstacles = [];
    let seed = 99; const rand = () => (seed = (seed*1103515245+12345)&0x7fffffff) / 0x7fffffff;
    function spawnObstacle(z){
      const m = new THREE.Mesh(new THREE.BoxGeometry(1.4,1.0,1.4),
        new THREE.MeshStandardMaterial({ color:0xe0556b, metalness:0.3, roughness:0.5, emissive:0x3a0a14, emissiveIntensity:0.6 }));
      m.position.set((Math.floor(rand()*3)-1)*2.2, 0.5, z); m.castShadow=true;
      scene.add(m); obstacles.push(m);
    }
    for (let i=0;i<6;i++) spawnObstacle(-10 - i*12);

    // spark pool
    const sparks=[]; const sparkGeo=new THREE.SphereGeometry(0.13,6,6);
    for(let i=0;i<26;i++){ const s=new THREE.Mesh(sparkGeo,
      new THREE.MeshStandardMaterial({color:0xffcf6b,emissive:0xff8a3b,emissiveIntensity:2}));
      s.visible=false; scene.add(s); sparks.push({m:s,vx:0,vy:0,vz:0,life:0}); }
    function burst(x,y,z){ for(const p of sparks){ p.m.position.set(x,y,z); p.m.visible=true;
      p.vx=(rand()-0.5)*0.4; p.vy=rand()*0.4+0.1; p.vz=(rand()-0.5)*0.4; p.life=1; } }

    let targetX = 0, speed = 0.6, score = 0, alive = true, paused=false;
    let best = +(localStorage.getItem(BEST_KEY)||0);
    document.getElementById('best').textContent=best;

    onDrag(renderer.domElement, { move:({dx})=>{
      if(alive&&!paused) targetX = Math.max(-3, Math.min(3, targetX + dx*0.02));
    }});
    renderer.domElement.addEventListener('pointerdown',(e)=>{ if(!alive||paused) return;
      const half=innerWidth/2; targetX=Math.max(-3,Math.min(3, targetX+(e.clientX<half?-1.5:1.5))); });

    const KEYS=new Set(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','a','A','d','D','w','W','s','S',' ','Enter','r','R','p','P']);
    addEventListener('keydown',(e)=>{
      if(KEYS.has(e.key)) e.preventDefault();
      if(e.key==='r'||e.key==='R'){ reset(); return; }
      if(e.key==='p'||e.key==='P'){ if(alive) paused=!paused; return; }
      if(!alive){ if(e.key===' '||e.key==='Enter') reset(); return; }
      if(paused) return;
      if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') targetX=Math.max(-3,targetX-2.2);
      else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') targetX=Math.min(3,targetX+2.2);
    });

    function reset(){ obstacles.forEach((o,i)=>{ o.position.z = -10 - i*12; o.position.x=(Math.floor(rand()*3)-1)*2.2; });
      targetX=0; carGroup.position.x=0; speed=0.6; score=0; alive=true; paused=false;
      sparks.forEach(p=>{p.m.visible=false;p.life=0;});
      document.getElementById('score').textContent=0; document.getElementById('over').classList.remove('show'); }
    document.getElementById('again').onclick=reset;

    function end(){ alive=false; burst(carGroup.position.x,0.5,carGroup.position.z);
      if(score>best){ best=score; localStorage.setItem(BEST_KEY,best); document.getElementById('best').textContent=best; }
      document.getElementById('finalScore').textContent=score;
      document.getElementById('finalBest').textContent=best;
      document.getElementById('over').classList.add('show'); }

    function resize(){ const w=innerWidth,h=innerHeight; renderer.setSize(w,h);
      camera.aspect=w/h; camera.updateProjectionMatrix(); }
    addEventListener('resize', resize); resize();

    let t=0;
    function animate(){ requestAnimationFrame(animate); t+=0.016;
      if (alive&&!paused){
        carGroup.position.x += (targetX - carGroup.position.x) * 0.2;
        carGroup.rotation.z = (carGroup.position.x - targetX) * 0.12;
        carGroup.position.y=0.4+Math.sin(t*8)*0.015;
        accent.position.x=carGroup.position.x; accent.position.z=carGroup.position.z;
        roads.forEach(r=>{ r.position.z += speed; if (r.position.z > 30) r.position.z -= 120; });
        dashes.forEach(d=>{ d.position.z += speed; if(d.position.z>8) d.position.z-=108; });
        for (const o of obstacles){
          o.position.z += speed; o.rotation.y+=0.02;
          if (o.position.z > 10){ o.position.z -= 72; o.position.x = (Math.floor(rand()*3)-1)*2.2;
            score++; document.getElementById('score').textContent = score; speed = Math.min(speed+0.01,1.6); }
          if (Math.abs(o.position.z - carGroup.position.z) < 1.6 && Math.abs(o.position.x - carGroup.position.x) < 1.4) end();
        }
      }
      for(const p of sparks){ if(p.life>0){ p.life-=0.03; p.vy-=0.02;
        p.m.position.x+=p.vx; p.m.position.y+=p.vy; p.m.position.z+=p.vz;
        p.m.scale.setScalar(Math.max(0.01,p.life)); if(p.life<=0) p.m.visible=false; } }
      renderer.render(scene,camera);
    }
    reset(); animate();
  </script>
</body>
</html>
