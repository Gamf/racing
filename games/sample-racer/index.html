<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f13">
  <title>Lane Dash — Gamf</title>
  <style>
    *{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#0e0f13;color:#f2f3f5;
      font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:none;
      -webkit-user-select:none;user-select:none}
    .hud{position:fixed;top:env(safe-area-inset-top);left:0;right:0;display:flex;gap:16px;
      padding:12px 16px;align-items:center;pointer-events:none;z-index:2}
    .hud a{color:#6c8cff;text-decoration:none;font-size:.9rem;pointer-events:auto}
    .hud .score{margin-left:auto;font-weight:700}
    .hint{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 14px);left:0;right:0;text-align:center;
      color:#7d8493;font-size:.85rem;z-index:2;pointer-events:none}
    canvas{display:block;width:100%;height:100%;touch-action:none}
  </style>
</head>
<body>
  <div class="hud"><a href="../../">← Racing</a><span class="score">Score: <b id="score">0</b></span></div>
  <div class="hint">Drag left / right to steer · dodge the blocks</div>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { onDrag } from './touch.js';

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0c1018);
    scene.fog = new THREE.Fog(0x0c1018, 18, 60);

    const camera = new THREE.PerspectiveCamera(65, 1, 0.1, 120);
    camera.position.set(0, 4.5, 8);
    camera.lookAt(0, 0, -10);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x202840, 1.0));
    const dir = new THREE.DirectionalLight(0xffffff, 0.8); dir.position.set(2,8,4); scene.add(dir);

    const ROAD_W = 8;
    // Road: two long planes recycled to fake endless motion.
    const roadMat = new THREE.MeshStandardMaterial({ color:0x222838 });
    const roads = [0,1].map(i=>{ const m=new THREE.Mesh(new THREE.PlaneGeometry(ROAD_W,60), roadMat);
      m.rotation.x=-Math.PI/2; m.position.z = -i*60; scene.add(m); return m; });

    // Player car.
    const car = new THREE.Mesh(new THREE.BoxGeometry(1.4,0.8,2.4),
      new THREE.MeshStandardMaterial({ color:0xf2c14e, metalness:0.2, roughness:0.4 }));
    car.position.set(0,0.4,4); scene.add(car);

    // Obstacle pool.
    const obstacles = [];
    let seed = 99; const rand = () => (seed = (seed*1103515245+12345)&0x7fffffff) / 0x7fffffff;
    function spawnObstacle(z){
      const m = new THREE.Mesh(new THREE.BoxGeometry(1.4,1.0,1.4),
        new THREE.MeshStandardMaterial({ color:0xe0556b }));
      m.position.set((Math.floor(rand()*3)-1)*2.2, 0.5, z);
      scene.add(m); obstacles.push(m);
    }
    for (let i=0;i<6;i++) spawnObstacle(-10 - i*12);

    // Steer by dragging horizontally.
    let targetX = 0;
    onDrag(renderer.domElement, { move:({dx})=>{
      targetX = Math.max(-3, Math.min(3, targetX + dx*0.02));
    }});

    let speed = 0.6, score = 0, alive = true;
    function reset(){ obstacles.forEach((o,i)=>o.position.z = -10 - i*12); targetX=0; car.position.x=0;
      speed=0.6; score=0; alive=true; }

    function resize(){ const w=innerWidth,h=innerHeight; renderer.setSize(w,h);
      camera.aspect=w/h; camera.updateProjectionMatrix(); }
    addEventListener('resize', resize); resize();

    function animate(){
      if (alive){
        car.position.x += (targetX - car.position.x) * 0.2;
        car.rotation.z = (car.position.x - targetX) * 0.15;
        roads.forEach(r=>{ r.position.z += speed; if (r.position.z > 30) r.position.z -= 120; });
        for (const o of obstacles){
          o.position.z += speed;
          if (o.position.z > 10){ o.position.z -= 72; o.position.x = (Math.floor(rand()*3)-1)*2.2;
            score++; document.getElementById('score').textContent = score; speed += 0.01; }
          // collision
          if (Math.abs(o.position.z - car.position.z) < 1.6 && Math.abs(o.position.x - car.position.x) < 1.4){
            alive = false;
            document.getElementById('score').textContent = score + ' — tap to retry';
          }
        }
      }
      renderer.render(scene,camera);
      requestAnimationFrame(animate);
    }
    renderer.domElement.addEventListener('pointerup', ()=>{ if(!alive) reset(); });
    animate();
  </script>
</body>
</html>
