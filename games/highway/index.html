<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f13">
  <title>Highway — Gamf</title>
  <style>
    *{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#0e0f13;color:#f2f3f5;
      font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:none;
      -webkit-user-select:none;user-select:none}
    .hud{position:fixed;top:env(safe-area-inset-top);left:0;right:0;display:flex;gap:16px;
      padding:12px 16px;align-items:center;pointer-events:none;z-index:2;font-weight:700}
    .hud a{color:#6c8cff;text-decoration:none;font-size:.9rem;pointer-events:auto;font-weight:400}
    .hud .best{color:#7fe7c4}
    .hud .sc{margin-left:auto;color:#f2c14e}
    .hint{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 16px);left:0;right:0;text-align:center;
      color:#7d8493;font-size:.85rem;z-index:2;pointer-events:none}
    .over{position:fixed;inset:0;display:none;place-items:center;background:rgba(8,9,13,.78);z-index:3;text-align:center}
    .over.show{display:grid} .over h2{margin:0 0 6px;font-size:1.7rem;color:#e0556b}
    .over .row{color:#cdd2dd;margin:2px 0} .over b{color:#f2c14e}
    .over button{all:unset;margin-top:16px;color:#0e0f13;background:linear-gradient(135deg,#f2c14e,#f0a830);
      font-weight:700;padding:12px 22px;border-radius:12px;cursor:pointer}
    canvas{display:block;width:100%;height:100%;touch-action:none}
  </style>
</head>
<body>
  <div class="hud"><a href="../../">← Racing</a><span class="best">Best: <span id="best">0</span></span>
    <span class="sc">Score: <span id="score">0</span></span></div>
  <div class="hint">swipe / drag · A D / ← → steer · P pause · R restart</div>
  <div class="over" id="over"><div><h2>Crashed!</h2>
    <div class="row">Score <b id="finalScore">0</b></div>
    <div class="row">Best <b id="finalBest">0</b></div>
    <button id="again">Drive again ⟳</button></div></div>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { onDrag } from './touch.js';

    const SLUG='highway', BEST_KEY='gamf-racing-'+SLUG+'-best';
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
    renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const scene=new THREE.Scene();
    // gradient skybox via vertex-colored background
    const bgTop=new THREE.Color(0x10131f), bgBot=new THREE.Color(0x0a0c12);
    scene.background=bgBot.clone();
    scene.fog=new THREE.Fog(0x0a0c12,22,72);
    const camera=new THREE.PerspectiveCamera(66,1,0.1,160); camera.position.set(0,5.2,9.5); camera.lookAt(0,0.4,-12);

    scene.add(new THREE.HemisphereLight(0x9fb4ff,0x161a26,0.85));
    const dl=new THREE.DirectionalLight(0xffffff,1.05); dl.position.set(5,12,6);
    dl.castShadow=true; dl.shadow.mapSize.set(1024,1024);
    dl.shadow.camera.near=1; dl.shadow.camera.far=50;
    dl.shadow.camera.left=-14; dl.shadow.camera.right=14; dl.shadow.camera.top=14; dl.shadow.camera.bottom=-14;
    scene.add(dl);
    // subtle accent point light that follows the car
    const accent=new THREE.PointLight(0x6c8cff,0.8,26); accent.position.set(0,4,6); scene.add(accent);

    const ROAD_W=9, LANES=[-3,0,3];
    const roadMat=new THREE.MeshStandardMaterial({color:0x1c2230,metalness:0.2,roughness:0.85});
    const roads=[0,1].map(i=>{ const m=new THREE.Mesh(new THREE.PlaneGeometry(ROAD_W,70),roadMat);
      m.rotation.x=-Math.PI/2; m.position.z=-i*70; m.receiveShadow=true; scene.add(m); return m; });
    // glowing road edges
    const edgeMat=new THREE.MeshStandardMaterial({color:0x6c8cff,emissive:0x2a40b0,emissiveIntensity:1.2});
    [-1,1].forEach(s=>{ const e=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.12,140),edgeMat);
      e.position.set(s*(ROAD_W/2-0.1),0.05,-35); scene.add(e); });
    // lane dashes
    const dashMat=new THREE.MeshStandardMaterial({color:0x4a5570,emissive:0x20283c,emissiveIntensity:0.6});
    const dashes=[]; for(let i=0;i<24;i++){ const d=new THREE.Mesh(new THREE.PlaneGeometry(0.25,3),dashMat);
      d.rotation.x=-Math.PI/2; d.position.set(i%2?1.5:-1.5,0.02,-i*6); scene.add(d); dashes.push(d); }
    // floating side scenery (parallax pylons)
    const pyMat=new THREE.MeshStandardMaterial({color:0x232a3c,metalness:0.4,roughness:0.6,emissive:0x10202a,emissiveIntensity:0.4});
    const pylons=[]; for(let i=0;i<10;i++){ const s=i%2?-1:1; const p=new THREE.Mesh(new THREE.BoxGeometry(0.6,3+(i%3),0.6),pyMat);
      p.position.set(s*7.5,1.5,-i*14); p.castShadow=true; scene.add(p); pylons.push(p); }

    // Player car: body + cabin + emissive tail
    const carGroup=new THREE.Group();
    const car=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.7,2.6),
      new THREE.MeshStandardMaterial({color:0xf2c14e,metalness:0.5,roughness:0.3}));
    car.castShadow=true; carGroup.add(car);
    const cabin=new THREE.Mesh(new THREE.BoxGeometry(1.05,0.55,1.2),
      new THREE.MeshStandardMaterial({color:0x10131f,metalness:0.6,roughness:0.2}));
    cabin.position.set(0,0.55,0.1); cabin.castShadow=true; carGroup.add(cabin);
    const tail=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.2,0.2),
      new THREE.MeshStandardMaterial({color:0xe0556b,emissive:0xe0556b,emissiveIntensity:2}));
    tail.position.set(0,0.1,1.35); carGroup.add(tail);
    carGroup.position.set(0,0.45,4); scene.add(carGroup);

    const obstacles=[]; let seed=99; const rnd=()=> (seed=(seed*1103515245+12345)&0x7fffffff)/0x7fffffff;
    const obMat=()=>new THREE.MeshStandardMaterial({color:0xe0556b,metalness:0.3,roughness:0.5,emissive:0x3a0a14,emissiveIntensity:0.6});
    function mkOb(z){ const m=new THREE.Mesh(new THREE.BoxGeometry(1.5,1.0,2.4),obMat());
      m.position.set(LANES[Math.floor(rnd()*3)],0.5,z); m.castShadow=true; scene.add(m); obstacles.push(m); }
    for(let i=0;i<7;i++) mkOb(-12-i*14);

    // particle burst pool for crashes
    const sparks=[]; const sparkGeo=new THREE.SphereGeometry(0.14,6,6);
    for(let i=0;i<28;i++){ const s=new THREE.Mesh(sparkGeo,
      new THREE.MeshStandardMaterial({color:0xffcf6b,emissive:0xff8a3b,emissiveIntensity:2}));
      s.visible=false; scene.add(s); sparks.push({m:s,vx:0,vy:0,vz:0,life:0}); }
    function burst(x,y,z){ for(const p of sparks){ p.m.position.set(x,y,z); p.m.visible=true;
      p.vx=(rnd()-0.5)*0.4; p.vy=rnd()*0.4+0.1; p.vz=(rnd()-0.5)*0.4; p.life=1; } }

    let targetX,speed,score,alive,paused,best=+(localStorage.getItem(BEST_KEY)||0);
    document.getElementById('best').textContent=best;
    function reset(){ targetX=0; carGroup.position.x=0; speed=0.55; score=0; alive=true; paused=false;
      obstacles.forEach((o,i)=>{ o.position.z=-12-i*14; o.position.x=LANES[Math.floor(rnd()*3)]; });
      sparks.forEach(p=>{p.m.visible=false;p.life=0;});
      document.getElementById('score').textContent=0; document.getElementById('over').classList.remove('show'); }

    // ---- input: drag/swipe + tap sides ----
    onDrag(renderer.domElement,{ move:({dx})=>{ if(alive&&!paused) targetX=Math.max(-3,Math.min(3,targetX+dx*0.02)); }});
    renderer.domElement.addEventListener('pointerdown',(e)=>{ if(!alive||paused) return;
      const half=innerWidth/2; targetX=Math.max(-3,Math.min(3, targetX+(e.clientX<half?-1.5:1.5))); });

    // ---- keyboard ----
    const KEYS=new Set(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','a','A','d','D','w','W','s','S',' ','Enter','r','R','p','P']);
    addEventListener('keydown',(e)=>{
      if(KEYS.has(e.key)) e.preventDefault();
      if(e.key==='r'||e.key==='R'){ reset(); return; }
      if(e.key==='p'||e.key==='P'){ if(alive) paused=!paused; return; }
      if(!alive){ if(e.key===' '||e.key==='Enter'){ reset(); } return; }
      if(paused) return;
      if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') targetX=Math.max(-3,targetX-3);
      else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') targetX=Math.min(3,targetX+3);
    });

    function resize(){ renderer.setSize(innerWidth,innerHeight);
      camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); }
    addEventListener('resize',resize); resize();

    function end(){ alive=false; burst(carGroup.position.x,0.5,carGroup.position.z);
      if(score>best){ best=score; localStorage.setItem(BEST_KEY,best); document.getElementById('best').textContent=best; }
      document.getElementById('finalScore').textContent=score;
      document.getElementById('finalBest').textContent=best;
      document.getElementById('over').classList.add('show'); }
    document.getElementById('again').onclick=reset;

    let t=0;
    function animate(){ requestAnimationFrame(animate); t+=0.016;
      if(alive&&!paused){
        carGroup.position.x+=(targetX-carGroup.position.x)*0.2;
        carGroup.rotation.z=(carGroup.position.x-targetX)*0.12;
        carGroup.position.y=0.45+Math.sin(t*8)*0.015;
        accent.position.x=carGroup.position.x; accent.position.z=carGroup.position.z;
        roads.forEach(r=>{ r.position.z+=speed; if(r.position.z>35) r.position.z-=140; });
        dashes.forEach(d=>{ d.position.z+=speed; if(d.position.z>10) d.position.z-=144; });
        pylons.forEach(p=>{ p.position.z+=speed; if(p.position.z>14) p.position.z-=140; p.rotation.y+=0.01; });
        for(const o of obstacles){ o.position.z+=speed; o.rotation.y+=0.02;
          if(o.position.z>10){ o.position.z-=98; o.position.x=LANES[Math.floor(rnd()*3)];
            score++; document.getElementById('score').textContent=score; speed=Math.min(speed+0.012,1.6); }
          if(Math.abs(o.position.z-carGroup.position.z)<2.2 && Math.abs(o.position.x-carGroup.position.x)<1.5) end(); }
      }
      // animate sparks even while game-over
      for(const p of sparks){ if(p.life>0){ p.life-=0.03; p.vy-=0.02;
        p.m.position.x+=p.vx; p.m.position.y+=p.vy; p.m.position.z+=p.vz;
        p.m.scale.setScalar(Math.max(0.01,p.life)); if(p.life<=0) p.m.visible=false; } }
      renderer.render(scene,camera);
    }
    reset(); animate();
  </script>
</body>
</html>
