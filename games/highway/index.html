<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f13">
  <title>Highway — Gamf</title>
  <style>
    *{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#0e0f13;color:#f2f3f5;
      font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:none;
      -webkit-user-select:none;user-select:none}
    .hud{position:fixed;top:env(safe-area-inset-top);left:0;right:0;display:flex;gap:16px;
      padding:12px 16px;align-items:center;pointer-events:none;z-index:2;font-weight:700}
    .hud a{color:#6c8cff;text-decoration:none;font-size:.9rem;pointer-events:auto;font-weight:400}
    .hud .sc{margin-left:auto}
    .hint{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 16px);left:0;right:0;text-align:center;
      color:#7d8493;font-size:.85rem;z-index:2;pointer-events:none}
    .over{position:fixed;inset:0;display:none;place-items:center;background:rgba(8,9,13,.74);z-index:3;text-align:center}
    .over.show{display:grid} .over h2{margin:0 0 6px} .over button{all:unset;margin-top:14px;color:#0e0f13;
      background:#f2c14e;font-weight:700;padding:12px 22px;border-radius:12px;cursor:pointer}
    canvas{display:block;width:100%;height:100%;touch-action:none}
  </style>
</head>
<body>
  <div class="hud"><a href="../../">← Racing</a><span>Best: <span id="best">0</span></span>
    <span class="sc">Score: <span id="score">0</span></span></div>
  <div class="hint">Drag left / right to steer · or tap a side</div>
  <div class="over" id="over"><div><h2>Crashed!</h2><div>Score <b id="finalScore">0</b></div>
    <button id="again">Drive again</button></div></div>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { onDrag } from './touch.js';
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
    document.body.appendChild(renderer.domElement);

    const scene=new THREE.Scene(); scene.background=new THREE.Color(0x0c1018);
    scene.fog=new THREE.Fog(0x0c1018,20,70);
    const camera=new THREE.PerspectiveCamera(66,1,0.1,140); camera.position.set(0,5,9); camera.lookAt(0,0,-12);
    scene.add(new THREE.HemisphereLight(0xffffff,0x202840,1.0));
    const dl=new THREE.DirectionalLight(0xffffff,0.85); dl.position.set(3,9,4); scene.add(dl);

    const ROAD_W=9, LANES=[-3,0,3];
    const roadMat=new THREE.MeshStandardMaterial({color:0x222838});
    const roads=[0,1].map(i=>{ const m=new THREE.Mesh(new THREE.PlaneGeometry(ROAD_W,70),roadMat);
      m.rotation.x=-Math.PI/2; m.position.z=-i*70; scene.add(m); return m; });
    // lane dashes
    const dashes=[]; for(let i=0;i<24;i++){ const d=new THREE.Mesh(new THREE.PlaneGeometry(0.25,3),
      new THREE.MeshStandardMaterial({color:0x4a5570})); d.rotation.x=-Math.PI/2;
      d.position.set(i%2?1.5:-1.5,0.01,-i*6); scene.add(d); dashes.push(d); }

    const car=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.8,2.6),
      new THREE.MeshStandardMaterial({color:0xf2c14e,metalness:0.2,roughness:0.4}));
    car.position.set(0,0.4,4); scene.add(car);
    const cabin=new THREE.Mesh(new THREE.BoxGeometry(1.1,0.6,1.2),
      new THREE.MeshStandardMaterial({color:0x222838})); cabin.position.set(0,0.9,4.1); scene.add(cabin);

    const obstacles=[]; let seed=99; const rnd=()=> (seed=(seed*1103515245+12345)&0x7fffffff)/0x7fffffff;
    function mkOb(z){ const m=new THREE.Mesh(new THREE.BoxGeometry(1.5,1.0,2.4),
      new THREE.MeshStandardMaterial({color:0xe0556b})); m.position.set(LANES[Math.floor(rnd()*3)],0.5,z);
      scene.add(m); obstacles.push(m); }
    for(let i=0;i<7;i++) mkOb(-12-i*14);

    let targetX,speed,score,alive; let best=+(localStorage.getItem('gamf-racing-best')||0);
    document.getElementById('best').textContent=best;
    function reset(){ targetX=0; car.position.x=0; cabin.position.x=0; speed=0.55; score=0; alive=true;
      obstacles.forEach((o,i)=>{ o.position.z=-12-i*14; o.position.x=LANES[Math.floor(rnd()*3)]; });
      document.getElementById('score').textContent=0; document.getElementById('over').classList.remove('show'); }

    onDrag(renderer.domElement,{ move:({dx})=>{ targetX=Math.max(-3,Math.min(3,targetX+dx*0.02)); }});
    addEventListener('pointerup',(e)=>{ if(!alive){ if(e.target.id!=='again') return; }
      // tap-to-steer when not dragging much
    });
    renderer.domElement.addEventListener('pointerdown',(e)=>{ if(!alive) return;
      const half=innerWidth/2; targetX=Math.max(-3,Math.min(3, targetX + (e.clientX<half?-3:3))); });

    function resize(){ renderer.setSize(innerWidth,innerHeight);
      camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); }
    addEventListener('resize',resize); resize();

    function end(){ alive=false; if(score>best){ best=score; localStorage.setItem('gamf-racing-best',best);
      document.getElementById('best').textContent=best; }
      document.getElementById('finalScore').textContent=score; document.getElementById('over').classList.add('show'); }
    document.getElementById('again').onclick=reset;

    function animate(){ if(alive){ car.position.x+=(targetX-car.position.x)*0.2; cabin.position.x=car.position.x;
      car.rotation.z=(car.position.x-targetX)*0.15;
      roads.forEach(r=>{ r.position.z+=speed; if(r.position.z>35) r.position.z-=140; });
      dashes.forEach(d=>{ d.position.z+=speed; if(d.position.z>10) d.position.z-=144; });
      for(const o of obstacles){ o.position.z+=speed;
        if(o.position.z>10){ o.position.z-=98; o.position.x=LANES[Math.floor(rnd()*3)];
          score++; document.getElementById('score').textContent=score; speed+=0.012; }
        if(Math.abs(o.position.z-car.position.z)<2.2 && Math.abs(o.position.x-car.position.x)<1.5) end(); } }
      renderer.render(scene,camera); requestAnimationFrame(animate); }
    reset(); animate();
  </script>
</body>
</html>
